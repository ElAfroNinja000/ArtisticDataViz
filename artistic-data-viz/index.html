<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Mind Map - Spotify</title>
    <style>
      body { margin: 0; overflow: hidden; }
      /* touch-action: none lets OrbitControls/pointer gestures own touch input
         instead of the browser scrolling/zooming the page. */
      canvas { display: block; touch-action: none; }
      .label {
        position: absolute;
        /* Anchored at the cursor and lifted above it, so the tooltip sits to the
           upper-right of the pointer. pointer-events: none keeps clicks on canvas. */
        transform: translateY(-100%);
        pointer-events: none;
        font-family: sans-serif;
        /* Wrap within a cap instead of overflowing the viewport edge on mobile. */
        max-width: min(220px, 80vw);
        color: #fff;
        font-size: 14px;
        padding: 4px 8px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 8px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .label.visible { opacity: 1; }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #151b26;
        color: #fff;
        font-family: sans-serif;
        font-size: 18px;
        z-index: 100;
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 4px solid rgba(255, 255, 255, 0.22);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Shared look for the on-screen control pills */
      .ui-pill {
        position: fixed;
        z-index: 10;
        font-family: sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.72);
        border-radius: 12px;
        backdrop-filter: blur(4px);
      }

      /* "My Songs" panel (bottom-left): now-playing header + collapsible history.
         Replaces the visible YouTube player. */
      #nowplaying {
        left: 12px;
        bottom: 12px;
        width: min(340px, 78vw);
        box-sizing: border-box;
        padding: 8px 10px 8px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.3s ease, transform 0.3s ease;
        pointer-events: none;
      }
      #nowplaying.visible { opacity: 1; transform: none; pointer-events: auto; }
      /* Every descendant counts padding inside its width, so width:100% children
         (rows, toggle) never overflow the panel and spawn a scrollbar. */
      #nowplaying * { box-sizing: border-box; }
      #nowplaying .np-main { display: flex; align-items: center; gap: 10px; }
      #nowplaying .np-text { font-size: 13px; line-height: 1.35; min-width: 0; flex: 1; }
      #nowplaying .np-text > span {
        display: block;
        /* Wrap long titles/artists onto a new line instead of truncating or forcing
           a horizontal scrollbar (applies on desktop and mobile). */
        overflow-wrap: anywhere;
      }
      #nowplaying .np-now {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        opacity: 0.55;
      }
      #nowplaying .np-title { font-weight: 600; }
      #nowplaying .np-genre { font-size: 11px; opacity: 0.7; }
      #nowplaying .np-buttons { flex: none; display: flex; flex-direction: column; gap: 5px; }
      #nowplaying .np-buttons button {
        cursor: pointer;
        border: none;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        border-radius: 7px;
        padding: 5px 9px;
        font-size: 12px;
        white-space: nowrap;
      }
      #nowplaying .np-buttons button:hover { background: rgba(255, 255, 255, 0.28); }
      #nowplaying .np-playpause { font-size: 14px; line-height: 1; font-variant-emoji: text; }
      #nowplaying .np-star { font-size: 13px; line-height: 1; }

      /* Favorites & History: toggle row + scrollable list (only one open at a time) */
      #nowplaying .np-favorites-toggle,
      #nowplaying .np-history-toggle {
        cursor: pointer;
        border: none;
        background: rgba(255, 255, 255, 0.10);
        color: #fff;
        border-radius: 7px;
        padding: 6px 10px;
        font-size: 12px;
        white-space: nowrap;
      }
      #nowplaying .np-favorites-toggle:hover,
      #nowplaying .np-history-toggle:hover { background: rgba(255, 255, 255, 0.18); }
      #nowplaying .np-favorites,
      #nowplaying .np-history {
        display: none;
        flex-direction: column;
        gap: 2px;
        max-height: 38vh;
        /* y scrolls when the list is long; x stays hidden so a too-wide row can
           never spawn a horizontal scrollbar (overflow-y:auto alone would make
           overflow-x compute to auto). */
        overflow: hidden auto;
        /* Thin, discreet scrollbar everywhere (matches the slim mobile overlay
           look instead of the chunky native desktop scrollbar). */
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
      }
      #nowplaying .np-favorites::-webkit-scrollbar,
      #nowplaying .np-history::-webkit-scrollbar { width: 6px; }
      #nowplaying .np-favorites::-webkit-scrollbar-track,
      #nowplaying .np-history::-webkit-scrollbar-track { background: transparent; }
      #nowplaying .np-favorites::-webkit-scrollbar-thumb,
      #nowplaying .np-history::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.35);
        border-radius: 3px;
      }
      #nowplaying.favorites-open .np-favorites { display: flex; }
      #nowplaying.history-open .np-history { display: flex; }
      #nowplaying .hist-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #fff;
        border-radius: 7px;
        padding: 6px 8px;
        font-size: 12px;
        text-align: left;
      }
      #nowplaying .hist-row:hover { background: rgba(255, 255, 255, 0.10); }
      #nowplaying .hist-i { flex: none; opacity: 0.45; }
      /* Title + artist wrap onto new lines if long, rather than truncating or
         overflowing the row (which previously caused a horizontal scrollbar). */
      #nowplaying .hist-t { flex: 0 1 auto; min-width: 0; font-weight: 600; overflow-wrap: anywhere; }
      #nowplaying .hist-a { flex: 1 1 auto; min-width: 0; opacity: 0.6; overflow-wrap: anywhere; }
      /* Row action buttons (star, delete): same pill style as the play/pause button */
      #nowplaying .hist-fav,
      #nowplaying .hist-del {
        flex: none;
        cursor: pointer;
        border: none;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        border-radius: 7px;
        padding: 3px 7px;
        font-size: 12px;
        line-height: 1;
      }
      #nowplaying .hist-fav:hover,
      #nowplaying .hist-del:hover { background: rgba(255, 255, 255, 0.28); }

      /* Sphere-count control (bottom-right): a chip that expands into a panel */
      #sphere-chip {
        right: 12px;
        bottom: 12px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
        border-radius: 999px;
      }
      #sphere-panel {
        right: 12px;
        bottom: 12px;
        width: min(420px, 92vw);
        padding: 12px 14px;
        display: none;
        flex-direction: column;
        gap: 9px;
      }
      #sphere-panel.open { display: flex; }
      #sphere-panel .sp-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
      }
      #sphere-panel input[type="range"] { width: 100%; accent-color: #66c2a5; }
      #sphere-panel .sp-close {
        cursor: pointer;
        border: none;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 13px;
      }
      #sphere-panel input:disabled { opacity: 0.4; }

      /* --- Mobile: bigger, readable UI that stays out of the main view --- */
      @media (max-width: 600px) {
        /* Now playing: a full-width band pinned to the top (keeps the bottom-right
           Capacity control clear), larger text but kept slim. */
        #nowplaying {
          left: 0;
          right: 0;
          top: 0;
          bottom: auto;
          width: 100%;
          max-width: none;
          border-radius: 0;
          padding: 11px 16px;
          gap: 10px;
          transform: translateY(-100%);
        }
        #nowplaying.visible { transform: none; }
        #nowplaying .np-main { gap: 14px; }
        #nowplaying .np-text { font-size: 15px; }
        #nowplaying .np-now { font-size: 11px; }
        #nowplaying .np-title { font-size: 16px; }
        #nowplaying .np-artist { font-size: 14px; }
        #nowplaying .np-genre { font-size: 13px; }
        #nowplaying .np-buttons { flex-direction: row; align-items: center; gap: 8px; }
        #nowplaying .np-buttons button { padding: 9px 13px; font-size: 15px; }
        #nowplaying .np-playpause { font-size: 17px; }
        /* Lists: larger touch targets */
        #nowplaying .np-favorites-toggle,
        #nowplaying .np-history-toggle { padding: 10px 12px; font-size: 14px; }
        #nowplaying .np-favorites,
        #nowplaying .np-history { max-height: 50vh; }
        #nowplaying .hist-row { padding: 10px 10px; font-size: 14px; }
        #nowplaying .hist-fav,
        #nowplaying .hist-del { padding: 6px 10px; font-size: 14px; }

        /* Capacity: bottom-right, with larger touch targets. */
        #sphere-chip { padding: 11px 18px; font-size: 15px; }
        #sphere-panel { width: min(420px, 94vw); padding: 15px 16px; gap: 12px; }
        #sphere-panel .sp-row { font-size: 15px; }
        #sphere-panel .sp-close { padding: 4px 12px; font-size: 17px; }
        #sphere-panel input[type="range"] { height: 30px; }
      }
    </style>
  </head>
  <body>
    <div id="loading"><div class="load-text">Loading data...</div><div class="spinner"></div></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
