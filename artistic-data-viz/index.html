<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>3D Mind Map - Spotify</title>
    <style>
      body { margin: 0; overflow: hidden; }
      /* touch-action: none lets OrbitControls/pointer gestures own touch input
         instead of the browser scrolling/zooming the page. */
      canvas { display: block; touch-action: none; }
      .label {
        font-family: sans-serif;
        /* Wrap within a cap instead of overflowing the viewport edge on mobile. */
        max-width: min(220px, 80vw);
        text-align: center;
        color: #fff;
        font-size: 14px;
        padding: 4px 8px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 8px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .label.visible { opacity: 1; }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #151b26;
        color: #fff;
        font-family: sans-serif;
        font-size: 18px;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="loading">Chargement des données...</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
